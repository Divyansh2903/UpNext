version: "2"
type: frontend
tech_stack:
  - TypeScript
  - Next.js 16 (App Router)
  - React 19
  - Tailwind CSS v4
  - TanStack React Query v5
  - Express (backend API at :4000)
  - Native WebSocket (ws://localhost:4001)
  - PostgreSQL via Prisma (backend persistence)
routes:
  - path: /
    file: frontend/app/page.tsx
    auth_required: false
    description: "Landing page with hero, marketing bento grid, Get Started CTA, and Join Room modal trigger."
  - path: /host
    file: frontend/app/host/page.tsx
    auth_required: false
    description: "Client-side redirect to /host/auth."
  - path: /host/auth
    file: frontend/app/host/auth/page.tsx
    auth_required: false
    description: "Host entry. Renders HostAuthGate (login/signup form) when no JWT present, otherwise renders HostEntryPage dashboard with welcome and previous sessions list."
  - path: /session/[id]/join
    file: frontend/app/session/[id]/join/page.tsx
    auth_required: false
    description: "Participant pre-join screen. [id] is treated as the 6-char join code. Validates session via GET /sessions/:code, prompts for display name, then routes to /session/{uuid}."
  - path: /session/[id]
    file: frontend/app/session/[id]/page.tsx
    auth_required: false
    description: "Participant live session view. Sidebar with Live Session, History, People views, plus Invite Friends button. Edit-name dialog and session-ended state included."
  - path: /session/[id]/host
    file: frontend/app/session/[id]/host/page.tsx
    auth_required: true
    description: "Host live session view (host JWT required). Sidebar with Live Session, History, People, Settings. Includes Live Feed, queue, Invite panel, floating playback dock, YouTube player (mounts only when currentVideoId set), and Settings modal with Create new session and Stop Session controls. After stop, renders EndedHostSessionRecap inline."
features:
  - name: Host Sign-up
    description: "Create a new host account using display name, email, password. Errors surfaced via toast (no inline banner). Backend returns EmailAlreadyInUse on duplicate email."
    files:
      - frontend/app/host/auth/page.tsx
      - frontend/app/components/host/HostAuthGate.tsx
      - frontend/app/lib/api.ts
    entry_route: /host/auth
    user_interactions:
      - Switch to Sign-up tab
      - Fill display name, email, password
      - Click Create account
      - On duplicate email see error toast
    api_calls:
      - method: POST
        endpoint: /auth/signup
    auth_required: false
  - name: Host Login
    description: "Login with email and password. Stores JWT under upnext.host.token in localStorage. Invalid credentials produce toast 'Invalid email or password.'"
    files:
      - frontend/app/host/auth/page.tsx
      - frontend/app/components/host/HostAuthGate.tsx
      - frontend/app/lib/api.ts
    entry_route: /host/auth
    user_interactions:
      - Fill email and password on Login tab
      - Click Login
      - On invalid credentials see error toast
      - On success see authenticated dashboard with Welcome heading
    api_calls:
      - method: POST
        endpoint: /auth/login
      - method: GET
        endpoint: /auth/me
    auth_required: false
  - name: Host Logout
    description: "Logout button on host dashboard clears JWT and returns to HostAuthGate."
    files:
      - frontend/app/host/auth/page.tsx
    entry_route: /host/auth
    user_interactions:
      - Click Logout in dashboard header
      - See login/signup form again
    api_calls: []
    auth_required: true
  - name: Create Host Session from Dashboard
    description: "Authenticated host clicks Host a session, server creates a session, frontend stores join code and navigates to /session/{id}/host?code={joinCode}. Button label becomes Creating... while pending."
    files:
      - frontend/app/host/auth/page.tsx
      - frontend/app/lib/api.ts
    entry_route: /host/auth
    user_interactions:
      - Click Host a session
      - Observe Creating... label while pending
      - Land on host session view with visible join code in URL and header
    api_calls:
      - method: POST
        endpoint: /sessions/
    auth_required: true
  - name: Previous Sessions List
    description: "Host dashboard renders previous sessions with Live or Ended badge and participant count. Each row has Open dashboard (active) or View room (ended). Empty and error (Retry) states present."
    files:
      - frontend/app/host/auth/page.tsx
      - frontend/app/lib/api.ts
    entry_route: /host/auth
    user_interactions:
      - View previous sessions list
      - Click Open dashboard or View room
      - Click Retry if list fails to load
    api_calls:
      - method: GET
        endpoint: /sessions/host/mine
    auth_required: true
  - name: Join via Landing Modal (6-char code)
    description: "From landing, Join Link opens modal. Accepts 6-char alphanumeric code. Pre-validates via GET /sessions/:code. Routes to /session/{CODE}/join on success."
    files:
      - frontend/app/page.tsx
      - frontend/app/components/landing/JoinRoomModal.tsx
      - frontend/app/lib/joinCode.ts
    entry_route: /
    user_interactions:
      - Click Join Link in hero
      - Type 6-char code (uppercased on display)
      - Click Continue (label becomes Checking... while pending)
      - On invalid format see 'Please enter a valid URL.'
      - On nonexistent code see 'Session not found for code {CODE}'
    api_calls:
      - method: GET
        endpoint: /sessions/:code
    auth_required: false
  - name: Join via Landing Modal (full invite URL)
    description: "Modal also accepts full invite URL containing /session/{CODE}/join or ?code={CODE}. maxLength 512. Same preflight validation."
    files:
      - frontend/app/components/landing/JoinRoomModal.tsx
      - frontend/app/lib/joinCode.ts
    entry_route: /
    user_interactions:
      - Click Join Link
      - Paste full invite URL
      - Click Continue
      - On valid URL navigate to /session/{CODE}/join
    api_calls:
      - method: GET
        endpoint: /sessions/:code
    auth_required: false
  - name: Participant Pre-Join Screen
    description: "Shows session host card 'Curated by {hostName}', listener count, name input, and Enter the Gallery button. While loading, button label becomes 'Checking room...'. Persists guest UUID + display name to upnext.guest.* localStorage on submit, then routes to /session/{uuid}."
    files:
      - frontend/app/session/[id]/join/page.tsx
    entry_route: /session/[id]/join
    user_interactions:
      - View session host info
      - Type display name
      - Click Enter the Gallery
      - On invalid code see 'Session not found for code {CODE}'
    api_calls:
      - method: GET
        endpoint: /sessions/:code
    auth_required: false
  - name: Participant Live Session - Add Track
    description: "Add to Queue card accepts text query, YouTube URL, or Spotify URL. Search query produces keyboard-navigable suggestion dropdown (ArrowUp/Down/Enter). Submitting adds to queue via WS ADD_SONG. Invalid URLs surface error toast."
    files:
      - frontend/app/session/[id]/page.tsx
      - frontend/app/session/[id]/SessionProvider.tsx
    entry_route: /session/[id]
    user_interactions:
      - Type query in Add to Queue input
      - Use ArrowDown / ArrowUp to navigate suggestions
      - Press Enter to add highlighted suggestion
      - Or paste YouTube/Spotify URL and click Add Track
      - Observe queue update or error toast
    api_calls:
      - method: GET
        endpoint: /search?q={query}
    auth_required: false
  - name: Participant Live Session - Upvote
    description: "Each queue row has an upvote button that toggles. Filled state when votedByMe is true. Vote counts and queue order update live via WebSocket."
    files:
      - frontend/app/session/[id]/page.tsx
      - frontend/app/session/[id]/SessionProvider.tsx
    entry_route: /session/[id]
    user_interactions:
      - Click upvote on a queued track
      - See filled icon and count change
      - Observe queue reorder by votes
    api_calls: []
    auth_required: false
  - name: Participant Edit Display Name
    description: "Pencil icon next to 'Joined as {name}' opens dialog. Save commits name via WS UPDATE_NAME. Empty/whitespace-only name rejected by backend with error toast."
    files:
      - frontend/app/session/[id]/page.tsx
    entry_route: /session/[id]
    user_interactions:
      - Click edit-pencil
      - Replace name in input
      - Click Save (or Cancel)
      - On empty/whitespace-only name see error toast
    api_calls: []
    auth_required: false
  - name: Participant Invite Friends Modal
    description: "Sidebar Invite Friends button opens modal with invite path and Copy Link. Button states cycle Copy Link to Copied to reset (~1.6s). On failure Retry plus toast 'Could not copy link. Please copy manually.' Closed via X."
    files:
      - frontend/app/session/[id]/page.tsx
    entry_route: /session/[id]
    user_interactions:
      - Click Invite Friends in sidebar
      - Click Copy Link
      - See Copied state then reset
      - Close via X
    api_calls: []
    auth_required: false
  - name: Participant History and People Views
    description: "History view lists previously played songs (empty state 'No songs played yet.'). People view lists Members Joined; host shown with Host badge derived from sessionHost helper."
    files:
      - frontend/app/session/[id]/page.tsx
      - frontend/app/lib/sessionHost.ts
    entry_route: /session/[id]
    user_interactions:
      - Click History sidebar item
      - Click People sidebar item
      - Verify Host badge appears for host user
    api_calls: []
    auth_required: false
  - name: Participant Session-Closed Screen
    description: "When WS reports SessionExpired or SessionNotFound, the page renders 'Host ended this session' with Go Home and Create Your Own Session CTAs. Sidebar/queue not rendered."
    files:
      - frontend/app/session/[id]/page.tsx
    entry_route: /session/[id]
    user_interactions:
      - Observe Host ended this session screen
      - Click Go Home then land on /
      - Click Create Your Own Session then land on /host/auth
    api_calls: []
    auth_required: false
  - name: Host Session View - Layout and Live Feed
    description: "Host live view shows now-playing card, Live Feed (jam events), queue, and Invite your crowd panel with Copy Link. Floating playback dock with play/pause/skip; disabled until currentVideoId present."
    files:
      - frontend/app/session/[id]/host/page.tsx
    entry_route: /session/[id]/host
    user_interactions:
      - View Live Feed entries (joined the jam, started the jam, voted for ...)
      - Use Copy Link in Invite your crowd panel
      - Verify YouTube player NOT mounted before any track plays
    api_calls:
      - method: GET
        endpoint: /sessions/by-id/:sessionId/summary
    auth_required: true
  - name: Host Settings Modal - Create New Session
    description: "Settings sidebar item opens Host Settings modal. Create new session triggers POST /sessions/. Label becomes Creating... while pending. On success navigates to new /session/{newId}/host?code={newCode}."
    files:
      - frontend/app/session/[id]/host/page.tsx
    entry_route: /session/[id]/host
    user_interactions:
      - Open Settings
      - Click Create new session
      - Land on new host session view
    api_calls:
      - method: POST
        endpoint: /sessions/
    auth_required: true
  - name: Host Settings Modal - Stop Session
    description: "Stop Session calls POST /sessions/by-id/:sessionId/stop. Label becomes Stopping... while pending. On success modal closes, host re-routes to same URL which resolves to EndedHostSessionRecap (Session Ended heading, participants list, songs played)."
    files:
      - frontend/app/session/[id]/host/page.tsx
    entry_route: /session/[id]/host
    user_interactions:
      - Open Settings
      - Click Stop Session (label becomes Stopping...)
      - See Session Ended recap inline
      - Verify Stop Session control no longer reachable
    api_calls:
      - method: POST
        endpoint: /sessions/by-id/:sessionId/stop
    auth_required: true
known_limitations:
  - issue: "No authenticated participant accounts; guest identity uses localStorage UUID."
    location: frontend/app/session/[id]/join/page.tsx
    impact: "Guest identity is per-browser only. Cannot test cross-device guest persistence."
  - issue: "YouTube player iframe does NOT auto-mount on session creation."
    location: frontend/app/session/[id]/host/page.tsx
    impact: "Tests must NOT assert player presence on a fresh empty session."
  - issue: "Host dashboard at /host/auth has no Settings panel, sidebar, Stop Session, queue, player, or invite link."
    location: frontend/app/host/auth/page.tsx
    impact: "Such controls only live in /session/[id]/host."
  - issue: "Host auth errors are toast-only, no inline banner."
    location: frontend/app/host/auth/page.tsx
    impact: "Tests must assert toast body, not inline text."
  - issue: "Landing Features, How It Works, View Demo are inert marketing buttons."
    location: frontend/app/page.tsx
    impact: "Do not assert navigation on these."
  - issue: "Headless Chromium clipboard APIs may flake."
    location: frontend/app/session/[id]/page.tsx
    impact: "Copy Link to Copied assertion needs a retry window."
  - issue: "Session join codes expire after 12h; reuse across runs causes false negatives."
    location: backend/src/modules/session/session.routes.ts
    impact: "Tests must always create a fresh session."
  - issue: "Transient WS connection errors are debounced ~1.2s and suppressed if reconnected."
    location: frontend/app/session/[id]/SessionProvider.tsx
    impact: "Do not assert immediate connection-error toast on first blip."
